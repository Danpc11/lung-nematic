name: tests

on:
  push:
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest

      - name: Run test suite
        run: pytest -q

  imports:
    # A package-structure break is invisible until something imports it, and
    # simulations/ holds two subpackages that define modules of the same name.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install matplotlib imageio imageio-ffmpeg
      - name: Import every entry point
        run: |
          python -c "import lung_nematic"
          python -c "import lung_nematic.synthetic"
          python -c "import simulations.alveolar"
          python -c "import simulations.fibrofocus"
          python -c "import simulations.coupled_analysis"
